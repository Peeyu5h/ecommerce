<div class="flex flex-col min-w-[400px] p-8">
    <div class="flex justify-between">
        <div>
            <h2 class="text-sm font-medium mb-1" >Sign Up</h2>
            <p class="text-sm text-gray-500">Join us and start shopping now</p>
        </div>
        <button class="-mt-2 -mr-2" mat-dialog-close matIconButton tabIndex="-1">
            <mat-icon>close</mat-icon>
        </button>
    </div>
    <form [formGroup]="signUpForm" (ngSubmit)="signUp()" class="flex-col mt-6 flex">
        <mat-form-field class="mb-4">
            <input formControlName="name" type="text" matInput placeholder="Enter your name"/>
            <mat-icon matPrefix>person</mat-icon>
        </mat-form-field>
        <mat-form-field class="mb-4">
            <input formControlName="email" type="email" matInput placeholder="Enter your email"/>
            <mat-icon matPrefix>email</mat-icon>
        </mat-form-field>
        <mat-form-field class="mb-4">
            <input formControlName="password" type="password" matInput placeholder="Enter your password"/>
            <mat-icon matPrefix>lock</mat-icon>
        </mat-form-field>
        <mat-form-field class="mb-4">
            <input formControlName="confirmPassword" type="password" matInput placeholder="Renter your password"/>
            <mat-icon matPrefix>lock</mat-icon>
        </mat-form-field>
        <button class="w-full" type="submit" matButton="filled">
            <!-- {{ store.loading() ? 'Creating Account...' : 'Create Account'}} -->
              Create Account
        </button>
    </form>
    <p class="text-sm text-gray-500 text-center mt-2">
        Already have an account?
        <a class="text-blue-600 cursor-pointer" (click)="openSignInDialog()">Sign In</a>
    </p>
</div>
